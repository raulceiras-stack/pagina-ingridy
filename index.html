  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #d4f5d4;
      --card: #fff;
      --accent: #e02020;
      --text: #1a1a1a;
      --muted: #555;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      max-width: 420px;
      width: 100%;
      height: 100%;
      max-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .img-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      flex: 1;
      min-height: 0;
    }

    .img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,10,0.7) 0%, transparent 50%);
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center top;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 5vw, 1.8rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
      color: #1a1a1a;
      flex-shrink: 0;
    }

    .sub {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      padding: 16px 48px;
      border-radius: 100px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      box-shadow: 0 4px 24px rgba(224,32,32,0.3);
      flex-shrink: 0;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(224,32,32,0.45);
      background: #c01a1a;
    }

    .btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="img-wrap">
      <img src="./imagem.jpg" alt="foto">
    </div>
    <h1>Quero te mostrar uma coisinha! 😈</h1>
    <p class="sub">conteúdo exclusivo</p>
    <a
      class="btn"
      href="https://t.me/+FUIsBb7YG9ZhMDEx"
      onclick="fbq('track', 'Contact')"
      target="_blank"
      rel="noopener"
    >
      Chamar agora!
    </a>
  </div>
</body>
</html>
